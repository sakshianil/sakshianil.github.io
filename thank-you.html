<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Thank you | Dr. Sakshi Bharti</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--surface, #f7f6f2);
      color: var(--text, #111);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .thank-you-card {
      max-width: 560px;
      padding: 2.5rem;
      border: 1px solid rgba(17, 17, 17, 0.12);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 18px 36px rgba(17, 17, 17, 0.08);
      text-align: center;
    }
    .thank-you-card h1 {
      margin: 0 0 0.75rem;
      font-size: clamp(1.7rem, 3vw, 2.3rem);
    }
    .thank-you-card p {
      margin: 0 0 1.2rem;
      line-height: 1.7;
      color: rgba(17, 17, 17, 0.72);
    }
    .thank-you-card a {
      display: inline-block;
      padding: 0.8rem 1.2rem;
      border-radius: 999px;
      text-decoration: none;
      color: white;
      background: #111111;
    }
  </style>
</head>
<body>
  <main class="thank-you-card">
    <h1>Thank you</h1>
    <p>Your enquiry has been received. I will get back to you shortly.</p>
    <a href="index.html">Return to portfolio</a>
  </main>
</body>
</html>
